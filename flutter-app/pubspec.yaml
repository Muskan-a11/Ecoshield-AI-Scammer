name: echoshield
description: EchoShield - Real-Time AI Scammer Interceptor
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  http: ^1.2.1
  dio: ^5.4.3+1

  # State management
  provider: ^6.1.2
  shared_preferences: ^2.2.3

  # Audio
  record: ^5.1.0
  just_audio: ^0.9.38
  permission_handler: ^11.3.1

  # UI
  fl_chart: ^0.68.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

  # Notifications
  flutter_local_notifications: ^17.2.1+2
  vibration: ^1.8.4

  # Auth & Storage
  flutter_secure_storage: ^9.0.0
  jwt_decoder: ^2.0.1

  # Phone / Call detection
  phone_state: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700
